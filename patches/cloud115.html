<div class="container-xl">
  <div class="page-header d-print-none">
    <div class="row align-items-center">
      <div class="col">
        <h2 class="page-title">115云端转移</h2>
        <div class="text-muted mt-1">使用 NASTool 识别命名，使用 115 API 云端移动。</div>
      </div>
    </div>
  </div>

  <div class="row row-cards mt-3">
    <div class="col-12 col-lg-8">
      <form class="card" method="post" action="/cloud115">
        <div class="card-body">
          {% if Message %}
          <div class="alert {% if Status %}alert-success{% else %}alert-danger{% endif %}" role="alert">
            {{ Message }}
          </div>
          {% endif %}
          <div class="mb-3">
            <label class="form-label">源目录</label>
            <input type="text" class="form-control" name="source_path" value="{{ SourcePath or '' }}"
                   placeholder="/mnt/CloudNAS/CloudDrive/nastool">
          </div>
          <div class="mb-3">
            <label class="form-label">目标目录</label>
            <input type="text" class="form-control" name="target_path" value="{{ TargetPath or '' }}"
                   placeholder="/mnt/CloudNAS/CloudDrive/nastool转移">
          </div>
          <div class="text-muted">
            目标目录用于 NASTool 生成最终分类和命名；实际移动由 CLOUD115_DEST_PREFIX 映射到 115 云端目录。
          </div>
        </div>
        <div class="card-footer text-end">
          <button type="submit" class="btn btn-primary">开始115云端转移</button>
        </div>
      </form>
    </div>
    <div class="col-12 col-lg-4">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">环境变量</h3>
        </div>
        <div class="card-body">
          <div class="mb-2"><code>CLOUD115_SRC_PREFIX</code></div>
          <div class="mb-2"><code>CLOUD115_REMOTE_SRC_ROOT</code></div>
          <div class="mb-2"><code>CLOUD115_DEST_PREFIX</code></div>
          <div class="mb-2"><code>CLOUD115_REMOTE_DEST_ROOT</code></div>
          <div class="text-muted">源目录和目标目录都可以继续填写 CloudDrive 挂载路径。</div>
        </div>
      </div>
    </div>
  </div>
</div>
